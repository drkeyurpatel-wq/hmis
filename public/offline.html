<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Health1 EMR — Offline</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f9fafb;color:#1a1a1a}
.card{text-align:center;padding:2rem;max-width:400px}.icon{font-size:48px;margin-bottom:1rem}h1{font-size:1.5rem;color:#1e40af;margin-bottom:0.5rem}p{color:#666;font-size:0.9rem;line-height:1.5;margin-bottom:1rem}
.btn{display:inline-block;padding:0.75rem 1.5rem;background:#1e40af;color:#fff;border:none;border-radius:8px;font-size:0.9rem;cursor:pointer;text-decoration:none}
.btn:hover{background:#1e3a8a}.note{margin-top:1.5rem;padding:1rem;background:#eff6ff;border-radius:8px;font-size:0.8rem;color:#1e40af}</style></head>
<body><div class="card">
<div class="icon">📡</div>
<h1>You're Offline</h1>
<p>The EMR page needs an internet connection to load for the first time. Once loaded, it works offline for consultations.</p>
<button class="btn" onclick="location.reload()">Try Again</button>
<div class="note">
<strong>Tip:</strong> If you had the EMR open before, your unsaved encounter drafts are safely stored locally and will sync when you're back online.
</div></div></body></html>
